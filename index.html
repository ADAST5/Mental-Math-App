<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mental Math</title>
  <style>
    :root {
      --bg: #0b1220;
      --surface: #121a2b;
      --surface-2: #1a2438;
      --surface-3: #22314a;
      --primary: #5bc0ff;
      --text: #f3f7fc;
      --muted: #94a3b8;
      --success: #22c55e;
      --error: #f87171;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(91, 192, 255, 0.08), transparent 30%),
        linear-gradient(180deg, #0b1220 0%, #0d1424 100%);
      color: var(--text);
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    .panel {
      background: rgba(18, 26, 43, 0.96);
      border: 1px solid rgba(148, 163, 184, 0.08);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .setup-shell {
      padding: 24px 18px 18px;
    }

    .title {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.03em;
      text-align: center;
      margin: 0 0 6px;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      margin: 0 0 18px;
    }

    .setup-card {
      padding: 16px;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin: 14px 0 6px;
    }

    select,
    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px 14px;
      font-size: 16px;
      box-sizing: border-box;
    }

    select {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid rgba(148, 163, 184, 0.08);
      appearance: none;
      outline: none;
    }

    button {
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.08s ease, opacity 0.15s ease, background 0.15s ease;
    }

    button:active {
      transform: scale(0.985);
    }

    .primary-btn {
      background: var(--primary);
      color: #062033;
      margin-top: 18px;
    }

    .ghost-btn {
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid rgba(148, 163, 184, 0.08);
    }

    #gameScreen {
      display: none;
      min-height: calc(100vh - 24px);
    }

    .topbar {
      display: grid;
      grid-template-columns: auto 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .chip,
    .back-chip {
      background: rgba(18, 26, 43, 0.96);
      border: 1px solid rgba(148, 163, 184, 0.08);
      box-shadow: var(--shadow);
      border-radius: 16px;
      min-height: 62px;
    }

    .chip {
      padding: 8px 6px;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .chip-label {
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .chip-value {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .back-chip {
      padding: 0;
      overflow: hidden;
    }

    .back-chip button {
      height: 100%;
      min-height: 62px;
      border-radius: 16px;
      margin: 0;
      background: transparent;
      color: var(--text);
    }

    .game-card {
      padding: 16px 14px;
    }

    .question {
      font-size: 30px;
      line-height: 1.15;
      text-align: center;
      font-weight: 700;
      letter-spacing: -0.03em;
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 2px 0 8px;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 12px;
      min-height: 16px;
    }

    .answer-display {
      min-height: 58px;
      border-radius: 16px;
      background: linear-gradient(180deg, #0d1526 0%, #10192d 100%);
      border: 1px solid rgba(91, 192, 255, 0.14);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 14px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
      overflow-x: auto;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    }

    .answer-display.correct-flash {
      border-color: rgba(34, 197, 94, 0.7);
      box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.18), 0 0 18px rgba(34, 197, 94, 0.15);
    }

    .answer-display.error-flash {
      border-color: rgba(248, 113, 113, 0.7);
      box-shadow: 0 0 0 1px rgba(248, 113, 113, 0.18), 0 0 18px rgba(248, 113, 113, 0.14);
    }

    .placeholder {
      color: #64748b;
      font-size: 18px;
      font-weight: 500;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .key {
      min-height: 58px;
      border-radius: 16px;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid rgba(148, 163, 184, 0.07);
      font-size: 22px;
      font-weight: 700;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
    }

    .key.action {
      background: var(--surface-3);
      color: var(--text);
    }

    .controls-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .submit-btn {
      background: var(--primary);
      color: #062033;
    }

    .feedback {
      min-height: 22px;
      margin-top: 10px;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
    }

    .feedback.success {
      color: var(--success);
    }

    .feedback.error {
      color: var(--error);
    }

    .history-toggle {
      margin-top: 12px;
    }

    #historyWrap {
      display: none;
      margin-top: 10px;
      padding-top: 8px;
    }

    .history-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .history-item {
      border-top: 1px solid rgba(148, 163, 184, 0.08);
      padding: 10px 0;
    }

    .history-q {
      font-size: 14px;
      margin-bottom: 4px;
      line-height: 1.35;
    }

    .history-a {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
    }

    .ok {
      color: var(--success);
      font-weight: 700;
    }

    .bad {
      color: var(--error);
      font-weight: 700;
    }

    .score-pop {
      animation: pop 0.22s ease;
    }

    @keyframes pop {
      0% { transform: scale(1); }
      35% { transform: scale(1.14); }
      100% { transform: scale(1); }
    }

    @media (max-width: 640px) {
      body {
        padding: 10px;
      }

      .title {
        font-size: 28px;
      }

      .topbar {
        gap: 6px;
      }

      .chip,
      .back-chip,
      .back-chip button {
        min-height: 58px;
      }

      .chip-label {
        font-size: 9px;
      }

      .chip-value {
        font-size: 16px;
      }

      .question {
        font-size: 26px;
        min-height: 62px;
      }

      .answer-display {
        min-height: 54px;
        font-size: 24px;
      }

      .key {
        min-height: 54px;
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="setupScreen">
      <div class="panel setup-shell">
        <h1 class="title">Mental Math</h1>
        <p class="subtitle">Sharpen speed and accuracy</p>

        <div class="setup-card">
          <label for="mode">Mode</label>
          <select id="mode">
            <option value="mixed">Mixed</option>
            <option value="addition">Addition</option>
            <option value="subtraction">Subtraction</option>
            <option value="multiplication">Multiplication</option>
            <option value="division">Division</option>
            <option value="percentages">Percentages</option>
          </select>

          <label for="level">Difficulty</label>
          <select id="level">
            <option value="0">Level 0 — tutorial</option>
            <option value="1">Level 1 — very easy</option>
            <option value="2">Level 2 — easy</option>
            <option value="3" selected>Level 3 — medium</option>
            <option value="4">Level 4 — hard</option>
            <option value="5">Level 5 — expert</option>
          </select>

          <label for="roundLength">Round</label>
          <select id="roundLength">
            <option value="30">30 seconds</option>
            <option value="60" selected>60 seconds</option>
            <option value="90">90 seconds</option>
            <option value="120">120 seconds</option>
          </select>

          <label for="answerMode">Tolerance</label>
          <select id="answerMode">
            <option value="approx" selected>Approximate</option>
            <option value="exact">Exact</option>
          </select>

          <button class="primary-btn" onclick="startGame()">Start Round</button>
        </div>
      </div>
    </div>

    <div id="gameScreen">
      <div class="topbar">
        <div class="back-chip">
          <button onclick="goBack()">Back</button>
        </div>

        <div class="chip">
          <div class="chip-label">Time</div>
          <div class="chip-value" id="time">0</div>
        </div>

        <div class="chip">
          <div class="chip-label">Score</div>
          <div class="chip-value" id="score">0</div>
        </div>

        <div class="chip">
          <div class="chip-label">Acc</div>
          <div class="chip-value" id="accuracy">0%</div>
        </div>
      </div>

      <div class="panel game-card">
        <div id="question" class="question">Press Start</div>
        <div id="hint" class="hint">Tap the keypad below to enter your answer</div>

        <div class="answer-display" id="answerDisplay">
          <span class="placeholder">Tap numbers below</span>
        </div>

        <div class="keypad">
          <button class="key" onclick="appendChar('1')">1</button>
          <button class="key" onclick="appendChar('2')">2</button>
          <button class="key" onclick="appendChar('3')">3</button>

          <button class="key" onclick="appendChar('4')">4</button>
          <button class="key" onclick="appendChar('5')">5</button>
          <button class="key" onclick="appendChar('6')">6</button>

          <button class="key" onclick="appendChar('7')">7</button>
          <button class="key" onclick="appendChar('8')">8</button>
          <button class="key" onclick="appendChar('9')">9</button>

          <button class="key action" onclick="appendMinus()">−</button>
          <button class="key" onclick="appendChar('0')">0</button>
          <button class="key action" onclick="appendDecimal()">.</button>
        </div>

        <div class="controls-row">
          <button class="ghost-btn" onclick="backspace()">Del</button>
          <button class="ghost-btn" onclick="clearAnswer()">Clear</button>
        </div>

        <div class="controls-row">
          <button class="ghost-btn" onclick="skipQuestion()">Skip</button>
          <button class="submit-btn" onclick="submitAnswer()">Submit</button>
        </div>

        <div id="feedback" class="feedback"></div>

        <button class="ghost-btn history-toggle" onclick="toggleHistory()">History</button>

        <div id="historyWrap">
          <div class="history-title">Recent Questions</div>
          <div id="history">No attempts yet.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let timeLeft = 0;
    let score = 0;
    let attempts = 0;
    let correctCount = 0;
    let timer = null;
    let active = false;
    let currentQuestion = null;
    let historyItems = [];
    let currentInput = "";

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function pick(arr) {
      return arr[randInt(0, arr.length - 1)];
    }

    function round1(n) {
      return Math.round(n * 10) / 10;
    }

    function round2(n) {
      return Math.round(n * 100) / 100;
    }

    function fmt(n) {
      if (Math.abs(n - Math.round(n)) < 0.0001) return String(Math.round(n));
      return String(round2(n));
    }

    function getLevel() {
      return Number(document.getElementById("level").value);
    }

    function getMode() {
      return document.getElementById("mode").value;
    }

    function getAnswerMode() {
      return document.getElementById("answerMode").value;
    }

    function tolerance(correctAnswer) {
      if (getAnswerMode() === "exact") return 0.05;
      const absVal = Math.abs(correctAnswer);
      if (absVal < 10) return 0.4;
      if (absVal < 100) return 1.0;
      return absVal * 0.025;
    }

    function makeAdditionQuestion(level) {
      if (level === 0) {
        const a = randInt(1, 10);
        const b = randInt(1, 10);
        return { text: `${a} + ${b}`, hint: "Add the two numbers", answer: a + b };
      }

      if (level === 1) {
        const a = randInt(1, 12);
        const b = randInt(1, 12);
        return { text: `${a} + ${b}`, hint: "Add the two numbers", answer: a + b };
      }

      if (level === 2) {
        const a = randInt(5, 20);
        const b = randInt(5, 20);
        return { text: `${a} + ${b}`, hint: "Add the two numbers", answer: a + b };
      }

      if (level === 3) {
        const a = randInt(10, 30);
        const b = randInt(10, 30);
        return { text: `${a} + ${b}`, hint: "Add the two numbers", answer: a + b };
      }

      if (level === 4) {
        const a = round1(Math.random() * 60 + 20);
        const b = round1(Math.random() * 60 + 20);
        return { text: `${fmt(a)} + ${fmt(b)}`, hint: "Add the two numbers", answer: round2(a + b) };
      }

      const a = round1(Math.random() * 100 + 40);
      const b = round1(Math.random() * 100 + 40);
      return { text: `${fmt(a)} + ${fmt(b)}`, hint: "Add the two numbers", answer: round2(a + b) };
    }

    function makeSubtractionQuestion(level) {
      if (level === 0) {
        let a = randInt(5, 15);
        let b = randInt(1, a);
        return { text: `${a} - ${b}`, hint: "Subtract the second number from the first", answer: a - b };
      }

      if (level === 1) {
        let a = randInt(8, 20);
        let b = randInt(1, a);
        return { text: `${a} - ${b}`, hint: "Subtract the second number from the first", answer: a - b };
      }

      if (level === 2) {
        let a = randInt(15, 35);
        let b = randInt(5, a - 1);
        return { text: `${a} - ${b}`, hint: "Subtract the second number from the first", answer: a - b };
      }

      if (level === 3) {
        let a = randInt(25, 60);
        let b = randInt(10, a - 1);
        return { text: `${a} - ${b}`, hint: "Subtract the second number from the first", answer: a - b };
      }

      if (level === 4) {
        let a = round1(Math.random() * 80 + 30);
        let b = round1(Math.random() * Math.min(70, a - 1));
        return { text: `${fmt(a)} - ${fmt(b)}`, hint: "Subtract the second number from the first", answer: round2(a - b) };
      }

      let a = round1(Math.random() * 120 + 50);
      let b = round1(Math.random() * Math.min(100, a - 1));
      return { text: `${fmt(a)} - ${fmt(b)}`, hint: "Subtract the second number from the first", answer: round2(a - b) };
    }

    function makeMultiplicationQuestion(level) {
      if (level === 0) {
        const a = randInt(2, 5);
        const b = randInt(2, 5);
        return { text: `${a} × ${b}`, hint: "Multiply the two numbers", answer: a * b };
      }

      if (level === 1) {
        const a = randInt(2, 10);
        const b = randInt(2, 10);
        return { text: `${a} × ${b}`, hint: "Multiply the two numbers", answer: a * b };
      }

      if (level === 2) {
        const a = randInt(3, 12);
        const b = randInt(3, 12);
        return { text: `${a} × ${b}`, hint: "Multiply the two numbers", answer: a * b };
      }

      if (level === 3) {
        const a = randInt(4, 15);
        const b = randInt(4, 15);
        return { text: `${a} × ${b}`, hint: "Multiply the two numbers", answer: a * b };
      }

      if (level === 4) {
        const a = randInt(6, 20);
        const b = randInt(6, 20);
        return { text: `${a} × ${b}`, hint: "Multiply the two numbers", answer: a * b };
      }

      const a = randInt(8, 30);
      const b = randInt(8, 25);
      return { text: `${a} × ${b}`, hint: "Multiply the two numbers", answer: a * b };
    }

    function makeDivisionQuestion(level) {
      if (level === 0) {
        const b = randInt(2, 5);
        const ans = randInt(1, 10);
        const a = b * ans;
        return { text: `${a} ÷ ${b}`, hint: "Divide the first number by the second", answer: ans };
      }

      if (level === 1) {
        const b = randInt(2, 10);
        const ans = randInt(2, 10);
        const a = b * ans;
        return { text: `${a} ÷ ${b}`, hint: "Divide the first number by the second", answer: ans };
      }

      if (level === 2) {
        const b = randInt(2, 12);
        const ans = randInt(2, 12);
        const a = b * ans;
        return { text: `${a} ÷ ${b}`, hint: "Divide the first number by the second", answer: ans };
      }

      if (level === 3) {
        const b = randInt(3, 15);
        const ans = randInt(3, 15);
        const a = b * ans;
        return { text: `${a} ÷ ${b}`, hint: "Divide the first number by the second", answer: ans };
      }

      if (level === 4) {
        const b = pick([4, 5, 8, 10, 20, 25]);
        const ans = round1(Math.random() * 20 + 5);
        const a = round1(b * ans);
        return { text: `${fmt(a)} ÷ ${fmt(b)}`, hint: "Divide the first number by the second", answer: round2(ans) };
      }

      const b = pick([3, 4, 5, 6, 8, 10, 12, 15, 20, 25]);
      const ans = round1(Math.random() * 35 + 5);
      const a = round1(b * ans);
      return { text: `${fmt(a)} ÷ ${fmt(b)}`, hint: "Divide the first number by the second", answer: round2(ans) };
    }

    function makePercentageQuestion(level) {
      if (level === 0) {
        const pairs = [
          [10, 10], [10, 20], [10, 30], [10, 40], [10, 50], [10, 80], [10, 100],
          [20, 10], [20, 20], [20, 30], [20, 40], [20, 50], [20, 80], [20, 100],
          [25, 20], [25, 40], [25, 60], [25, 80], [25, 100],
          [50, 10], [50, 20], [50, 30], [50, 40], [50, 50], [50, 80], [50, 100]
        ];
        const [pct, base] = pick(pairs);
        return { text: `${pct}% of ${base}`, hint: "Work out the percentage of the number", answer: base * pct / 100 };
      }

      if (level === 1) {
        const pairs = [
          [5, 20], [5, 40], [5, 60], [5, 80], [5, 100], [5, 120],
          [10, 25], [10, 35], [10, 45], [10, 60], [10, 90], [10, 120],
          [20, 25], [20, 35], [20, 45], [20, 50], [20, 75], [20, 150],
          [25, 24], [25, 36], [25, 48], [25, 60], [25, 120],
          [50, 25], [50, 35], [50, 45], [50, 70], [50, 90], [50, 120]
        ];
        const [pct, base] = pick(pairs);
        return { text: `${pct}% of ${base}`, hint: "Work out the percentage of the number", answer: base * pct / 100 };
      }

      if (level === 2) {
        const pairs = [
          [5, 140], [5, 180], [5, 220],
          [10, 135], [10, 175], [10, 220],
          [15, 40], [15, 60], [15, 80], [15, 120],
          [20, 45], [20, 65], [20, 95], [20, 125],
          [25, 28], [25, 44], [25, 68], [25, 84],
          [12.5, 40], [12.5, 80], [12.5, 120]
        ];
        const [pct, base] = pick(pairs);
        return { text: `${pct}% of ${base}`, hint: "Work out the percentage of the number", answer: round2(base * pct / 100) };
      }

      if (level === 3) {
        const pairs = [
          [5, 160], [5, 240],
          [10, 135], [10, 175], [10, 245],
          [15, 60], [15, 140],
          [20, 55], [20, 85], [20, 145],
          [25, 52], [25, 76], [25, 92], [25, 116],
          [12.5, 64], [12.5, 96], [12.5, 160]
        ];
        const [pct, base] = pick(pairs);
        return { text: `${pct}% of ${base}`, hint: "Work out the percentage of the number", answer: round2(base * pct / 100) };
      }

      if (level === 4) {
        const base = round1(Math.random() * 250 + 50);
        const pct = pick([6.5, 7.5, 8.5, 11.5, 12.5, 14.5, 17.5, 22.5]);
        return { text: `${pct}% of ${fmt(base)}`, hint: "Work out the percentage of the number", answer: round2(base * pct / 100) };
      }

      const base = round1(Math.random() * 400 + 80);
      const pct = round1(Math.random() * 20 + 5);
      return { text: `${fmt(pct)}% of ${fmt(base)}`, hint: "Work out the percentage of the number", answer: round2(base * pct / 100) };
    }

    function generateQuestionByMode(mode) {
      const level = getLevel();

      if (mode === "addition") return makeAdditionQuestion(level);
      if (mode === "subtraction") return makeSubtractionQuestion(level);
      if (mode === "multiplication") return makeMultiplicationQuestion(level);
      if (mode === "division") return makeDivisionQuestion(level);
      if (mode === "percentages") return makePercentageQuestion(level);

      const modes = ["addition", "subtraction", "multiplication", "division", "percentages"];
      return generateQuestionByMode(pick(modes));
    }

    function renderAnswerDisplay() {
      const display = document.getElementById("answerDisplay");
      if (!currentInput) {
        display.innerHTML = '<span class="placeholder">Tap numbers below</span>';
      } else {
        display.textContent = currentInput;
      }
    }

    function clearAnswer() {
      currentInput = "";
      renderAnswerDisplay();
    }

    function backspace() {
      currentInput = currentInput.slice(0, -1);
      renderAnswerDisplay();
    }

    function appendChar(char) {
      currentInput += char;
      renderAnswerDisplay();
    }

    function appendDecimal() {
      if (currentInput.includes(".")) return;
      if (currentInput === "" || currentInput === "-") {
        currentInput += "0.";
      } else {
        currentInput += ".";
      }
      renderAnswerDisplay();
    }

    function appendMinus() {
      if (currentInput.startsWith("-")) {
        currentInput = currentInput.slice(1);
      } else if (currentInput === "") {
        currentInput = "-";
      }
      renderAnswerDisplay();
    }

    function pulseScore() {
      const el = document.getElementById("score");
      el.classList.remove("score-pop");
      void el.offsetWidth;
      el.classList.add("score-pop");
    }

    function flashAnswer(type) {
      const el = document.getElementById("answerDisplay");
      el.classList.remove("correct-flash", "error-flash");
      void el.offsetWidth;
      el.classList.add(type === "correct" ? "correct-flash" : "error-flash");
      setTimeout(() => {
        el.classList.remove("correct-flash", "error-flash");
      }, 260);
    }

    function nextQuestion() {
      currentQuestion = generateQuestionByMode(getMode());
      document.getElementById("question").innerText = currentQuestion.text;
      document.getElementById("hint").innerText = currentQuestion.hint;
      const feedback = document.getElementById("feedback");
      feedback.innerHTML = "";
      feedback.className = "feedback";
      clearAnswer();
    }

    function updateStats() {
      document.getElementById("time").innerText = timeLeft;
      document.getElementById("score").innerText = score;
      const acc = attempts === 0 ? 0 : Math.round((correctCount / attempts) * 100);
      document.getElementById("accuracy").innerText = `${acc}%`;
    }

    function updateHistory() {
      const historyDiv = document.getElementById("history");
      if (historyItems.length === 0) {
        historyDiv.innerHTML = "No attempts yet.";
        return;
      }

      historyDiv.innerHTML = historyItems.slice(-8).reverse().map(item => `
        <div class="history-item">
          <div class="history-q">${item.q}</div>
          <div class="history-a">
            Your answer: ${item.user} | Correct: ${item.correct} |
            <span class="${item.ok ? 'ok' : 'bad'}">${item.ok ? 'Correct' : 'Wrong'}</span>
          </div>
        </div>
      `).join("");
    }

    function toggleHistory() {
      const wrap = document.getElementById("historyWrap");
      const btn = document.querySelector(".history-toggle");
      if (wrap.style.display === "block") {
        wrap.style.display = "none";
        btn.textContent = "History";
      } else {
        wrap.style.display = "block";
        btn.textContent = "Hide History";
      }
    }

    function startGame() {
      document.getElementById("setupScreen").style.display = "none";
      document.getElementById("gameScreen").style.display = "block";
      startRound();
      window.scrollTo(0, 0);
    }

    function goBack() {
      clearInterval(timer);
      active = false;
      document.getElementById("setupScreen").style.display = "block";
      document.getElementById("gameScreen").style.display = "none";
      window.scrollTo(0, 0);
    }

    function startRound() {
      clearInterval(timer);
      timeLeft = Number(document.getElementById("roundLength").value);
      score = 0;
      attempts = 0;
      correctCount = 0;
      active = true;
      updateStats();
      nextQuestion();

      timer = setInterval(() => {
        timeLeft--;
        updateStats();

        if (timeLeft <= 0) {
          clearInterval(timer);
          active = false;
          document.getElementById("question").innerText = `Time up. Final score: ${score}`;
          document.getElementById("hint").innerText = "Tap Back to return to settings, or start another round.";
          const feedback = document.getElementById("feedback");
          feedback.innerHTML = "";
          feedback.className = "feedback";
          clearAnswer();
        }
      }, 1000);
    }

    function submitAnswer() {
      if (!active || !currentQuestion) return;

      const raw = currentInput.trim();
      if (raw === "" || raw === "-" || raw === "." || raw === "-.") return;

      const user = Number(raw);
      if (Number.isNaN(user)) return;

      attempts++;
      const correct = currentQuestion.answer;
      const ok = Math.abs(user - correct) <= tolerance(correct);
      const feedback = document.getElementById("feedback");

      if (ok) {
        score++;
        correctCount++;
        feedback.innerHTML = "Correct";
        feedback.className = "feedback success";
        pulseScore();
        flashAnswer("correct");
      } else {
        feedback.innerHTML = `Correct answer: ${fmt(correct)}`;
        feedback.className = "feedback error";
        flashAnswer("error");
      }

      historyItems.push({
        q: currentQuestion.text,
        user: raw,
        correct: fmt(correct),
        ok
      });

      updateStats();
      updateHistory();

      setTimeout(() => {
        if (active) nextQuestion();
      }, 180);
    }

    function skipQuestion() {
      if (!active || !currentQuestion) return;

      historyItems.push({
        q: currentQuestion.text,
        user: "Skipped",
        correct: fmt(currentQuestion.answer),
        ok: false
      });

      const feedback = document.getElementById("feedback");
      feedback.innerHTML = `Skipped. Correct answer: ${fmt(currentQuestion.answer)}`;
      feedback.className = "feedback error";

      updateHistory();
      flashAnswer("error");

      setTimeout(() => {
        if (active) nextQuestion();
      }, 180);
    }

    document.addEventListener("keydown", function(event) {
      if (event.key >= "0" && event.key <= "9") appendChar(event.key);
      if (event.key === ".") appendDecimal();
      if (event.key === "-") appendMinus();
      if (event.key === "Backspace") backspace();
      if (event.key === "Enter") submitAnswer();
    });

    updateHistory();
    updateStats();
    renderAnswerDisplay();
  </script>
</body>
</html>
