<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mental Math App</title>

<style>
body {
  font-family: Arial;
  background:#0f172a;
  color:white;
  padding:15px;
  margin:0;
}

.container { max-width:760px; margin:0 auto; }

.card {
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

h1 { text-align:center; }

select, input, button {
  width:100%;
  padding:14px;
  margin-top:10px;
  font-size:16px;
  border-radius:8px;
  border:none;
}

input {
  background:white;
  color:black;
  font-size:18px;
}

button {
  background:#38bdf8;
  color:black;
  font-weight:bold;
}

.secondary {
  background:#334155;
  color:white;
}

.stats {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  text-align:center;
}

.stat { background:#0f172a; padding:10px; border-radius:8px; }

.question { font-size:24px; margin:15px 0; }

.correct { color:#22c55e; }
.wrong { color:#ef4444; }
</style>
</head>

<body>
<div class="container">

<h1>Mental Math</h1>

<div class="card">
<select id="mode">
<option value="mixed">Mixed</option>
<option value="addition">Addition</option>
<option value="subtraction">Subtraction</option>
<option value="multiplication">Multiplication</option>
<option value="division">Division</option>
<option value="percentages">Percentages</option>
</select>

<select id="level">
<option value="0">Level 0</option>
<option value="1">Level 1</option>
<option value="2">Level 2</option>
<option value="3" selected>Level 3</option>
<option value="4">Level 4</option>
<option value="5">Level 5</option>
</select>

<select id="roundLength">
<option value="30">30s</option>
<option value="60" selected>60s</option>
<option value="90">90s</option>
</select>

<button onclick="start()">Start</button>
</div>

<div class="card stats">
<div>Time<br><span id="time">0</span></div>
<div>Score<br><span id="score">0</span></div>
<div>Attempts<br><span id="attempts">0</span></div>
<div>Accuracy<br><span id="accuracy">0%</span></div>
</div>

<div class="card">
<div id="question" class="question">Press Start</div>

<input
id="answer"
type="text"
inputmode="decimal"
pattern="[0-9]*[.,]?[0-9]*"
placeholder="Answer"
autocomplete="off"
autocorrect="off"
autocapitalize="off"
spellcheck="false"
/>

<button onclick="submitAnswer()">Submit</button>
<button class="secondary" onclick="skip()">Skip</button>

<div id="feedback"></div>
</div>

</div>

<script>

let time=0, score=0, attempts=0, correct=0, timer;
let currentAnswer=0;

function rand(a,b){ return Math.floor(Math.random()*(b-a+1))+a }

function levelRange(l){
  if(l==0) return [1,10]
  if(l==1) return [1,20]
  if(l==2) return [5,40]
  if(l==3) return [10,80]
  if(l==4) return [20,150]
  return [25,250]
}

function nextQ(){
  let mode=document.getElementById("mode").value
  let l=Number(document.getElementById("level").value)
  let [min,max]=levelRange(l)

  let a=rand(min,max), b=rand(min,max)

  if(mode=="addition"){ currentAnswer=a+b; q=`${a} + ${b}` }
  else if(mode=="subtraction"){ if(a<b)[a,b]=[b,a]; currentAnswer=a-b; q=`${a} - ${b}` }
  else if(mode=="multiplication"){ currentAnswer=a*b; q=`${a} × ${b}` }
  else if(mode=="division"){
    let ans=rand(2,20); b=rand(2,12); a=ans*b;
    currentAnswer=ans; q=`${a} ÷ ${b}`
  }
  else if(mode=="percentages"){
    let p=[5,10,20,25][rand(0,3)]
    currentAnswer=(a*p/100)
    q=`${p}% of ${a}`
  }
  else{
    let types=["addition","subtraction","multiplication","division","percentages"]
    document.getElementById("mode").value=types[rand(0,4)]
    return nextQ()
  }

  document.getElementById("question").innerText=q
  document.getElementById("answer").value=""
}

function start(){
  score=0; attempts=0; correct=0;
  time=Number(document.getElementById("roundLength").value)
  update()
  nextQ()

  timer=setInterval(()=>{
    time--
    update()
    if(time<=0){
      clearInterval(timer)
      document.getElementById("question").innerText="Time up!"
    }
  },1000)
}

function submitAnswer(){
  let raw=document.getElementById("answer").value.trim()
  if(!raw) return

  let user=Number(raw.replace(",","."))
  if(isNaN(user)) return

  attempts++

  if(Math.abs(user-currentAnswer)<1){
    score++; correct++
    document.getElementById("feedback").innerHTML="<span class='correct'>Correct</span>"
  } else {
    document.getElementById("feedback").innerHTML="<span class='wrong'>Ans: "+currentAnswer+"</span>"
  }

  update()
  nextQ()
}

function skip(){
  nextQ()
}

function update(){
  document.getElementById("time").innerText=time
  document.getElementById("score").innerText=score
  document.getElementById("attempts").innerText=attempts
  let acc=attempts?Math.round(correct/attempts*100):0
  document.getElementById("accuracy").innerText=acc+"%"
}

document.getElementById("answer").addEventListener("keydown", e=>{
  if(e.key==="Enter") submitAnswer()
})

</script>
</body>
</html>
