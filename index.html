<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mental Math App</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    padding: 15px;
    margin: 0;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
  }

  .card {
    background: #1e293b;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 15px;
  }

  select, input, button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    box-sizing: border-box;
  }

  input {
    background: white;
    color: black;
  }

  button {
    background: #38bdf8;
    color: black;
    font-weight: bold;
    cursor: pointer;
  }

  button.secondary {
    background: #334155;
    color: white;
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    text-align: center;
  }

  .stat {
    background: #0f172a;
    padding: 12px;
    border-radius: 10px;
  }

  .stat-label {
    font-size: 12px;
    color: #cbd5e1;
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 22px;
    font-weight: bold;
  }

  .question {
    font-size: 24px;
    margin: 15px 0;
    line-height: 1.4;
  }

  .hint {
    color: #cbd5e1;
    font-size: 14px;
    margin-bottom: 10px;
  }

  .correct {
    color: #22c55e;
    font-weight: bold;
  }

  .wrong {
    color: #ef4444;
    font-weight: bold;
  }

  .muted {
    color: #cbd5e1;
    font-size: 13px;
  }

  .history-item {
    border-top: 1px solid #334155;
    padding: 10px 0;
  }

  .history-q {
    font-size: 14px;
    margin-bottom: 4px;
  }

  .history-a {
    font-size: 13px;
    color: #cbd5e1;
  }

  @media (max-width: 640px) {
    .stats {
      grid-template-columns: repeat(2, 1fr);
    }

    .question {
      font-size: 21px;
    }
  }
</style>
</head>
<body>
<div class="container">

  <h1>Mental Math App</h1>

  <div class="card">
    <label>Question type</label>
    <select id="mode">
      <option value="mixed">Mixed</option>
      <option value="addition">Addition</option>
      <option value="subtraction">Subtraction</option>
      <option value="multiplication">Multiplication</option>
      <option value="division">Division</option>
      <option value="percentages">Percentages</option>
    </select>

    <label>Level</label>
    <select id="level">
      <option value="0">Level 0 — tutorial</option>
      <option value="1">Level 1 — very easy</option>
      <option value="2">Level 2 — easy</option>
      <option value="3" selected>Level 3 — medium</option>
      <option value="4">Level 4 — hard</option>
      <option value="5">Level 5 — realistic</option>
    </select>

    <label>Round length</label>
    <select id="roundLength">
      <option value="30">30 seconds</option>
      <option value="60" selected>60 seconds</option>
      <option value="90">90 seconds</option>
      <option value="120">120 seconds</option>
    </select>

    <label>Answer mode</label>
    <select id="answerMode">
      <option value="approx" selected>Approximate</option>
      <option value="exact">Exact</option>
    </select>

    <button onclick="startRound()">Start Round</button>
    <button class="secondary" onclick="resetRound()">Reset</button>
  </div>

  <div class="card">
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Time</div>
        <div class="stat-value" id="time">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Score</div>
        <div class="stat-value" id="score">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Attempts</div>
        <div class="stat-value" id="attempts">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Accuracy</div>
        <div class="stat-value" id="accuracy">0%</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div id="question" class="question">Press Start Round</div>
    <div id="hint" class="hint">Answer as a plain number. For percentages, enter just the number, for example 12.5</div>
    <input id="answer" type="number" step="any" placeholder="Type answer here">
    <button onclick="submitAnswer()">Submit</button>
    <button class="secondary" onclick="skipQuestion()">Skip</button>
    <div id="feedback" style="margin-top:12px;"></div>
  </div>

  <div class="card">
    <div style="font-weight:bold; margin-bottom:8px;">Recent Questions</div>
    <div id="history" class="muted">No attempts yet.</div>
  </div>

</div>

<script>
let timeLeft = 0;
let score = 0;
let attempts = 0;
let correctCount = 0;
let timer = null;
let active = false;
let currentQuestion = null;
let historyItems = [];

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function pick(arr) {
  return arr[randInt(0, arr.length - 1)];
}

function round1(n) {
  return Math.round(n * 10) / 10;
}

function round2(n) {
  return Math.round(n * 100) / 100;
}

function fmt(n) {
  if (Math.abs(n - Math.round(n)) < 0.0001) return String(Math.round(n));
  return String(round2(n));
}

function getLevel() {
  return Number(document.getElementById("level").value);
}

function getMode() {
  return document.getElementById("mode").value;
}

function getAnswerMode() {
  return document.getElementById("answerMode").value;
}

function tolerance(correctAnswer) {
  if (getAnswerMode() === "exact") return 0.05;
  const absVal = Math.abs(correctAnswer);
  if (absVal < 10) return 0.4;
  if (absVal < 100) return 1.0;
  return absVal * 0.025;
}

function levelNumbers(level) {
  if (level === 0) return { min: 1, max: 10 };
  if (level === 1) return { min: 1, max: 20 };
  if (level === 2) return { min: 5, max: 40 };
  if (level === 3) return { min: 10, max: 80 };
  if (level === 4) return { min: 20, max: 150 };
  return { min: 25, max: 250 };
}

function makeAdditionQuestion(level) {
  if (level === 0) {
    const a = randInt(1, 10);
    const b = randInt(1, 10);
    return {
      text: `${a} + ${b}`,
      hint: "Add the two numbers",
      answer: a + b
    };
  }

  const r = levelNumbers(level);
  let a = randInt(r.min, r.max);
  let b = randInt(r.min, r.max);

  if (level >= 4) {
    a = round1(Math.random() * (r.max - r.min) + r.min);
    b = round1(Math.random() * (r.max - r.min) + r.min);
  }

  return {
    text: `${fmt(a)} + ${fmt(b)}`,
    hint: "Add the two numbers",
    answer: round2(a + b)
  };
}

function makeSubtractionQuestion(level) {
  if (level === 0) {
    let a = randInt(5, 15);
    let b = randInt(1, a);
    return {
      text: `${a} - ${b}`,
      hint: "Subtract the second number from the first",
      answer: a - b
    };
  }

  const r = levelNumbers(level);
  let a = randInt(r.min + 10, r.max + 20);
  let b = randInt(r.min, a);

  if (level >= 4) {
    a = round1(Math.random() * (r.max - r.min) + r.min + 20);
    b = round1(Math.random() * Math.min(a - 1, r.max));
  }

  return {
    text: `${fmt(a)} - ${fmt(b)}`,
    hint: "Subtract the second number from the first",
    answer: round2(a - b)
  };
}

function makeMultiplicationQuestion(level) {
  if (level === 0) {
    const a = randInt(2, 5);
    const b = randInt(2, 10);
    return {
      text: `${a} × ${b}`,
      hint: "Multiply the two numbers",
      answer: a * b
    };
  }

  if (level === 1) {
    const a = randInt(2, 10);
    const b = randInt(2, 12);
    return {
      text: `${a} × ${b}`,
      hint: "Multiply the two numbers",
      answer: a * b
    };
  }

  if (level === 2) {
    const a = randInt(4, 15);
    const b = randInt(4, 15);
    return {
      text: `${a} × ${b}`,
      hint: "Multiply the two numbers",
      answer: a * b
    };
  }

  if (level === 3) {
    const a = randInt(8, 25);
    const b = randInt(6, 20);
    return {
      text: `${a} × ${b}`,
      hint: "Multiply the two numbers",
      answer: a * b
    };
  }

  if (level === 4) {
    const a = randInt(12, 40);
    const b = randInt(8, 25);
    return {
      text: `${a} × ${b}`,
      hint: "Multiply the two numbers",
      answer: a * b
    };
  }

  const a = randInt(15, 60);
  const b = randInt(12, 35);
  return {
    text: `${a} × ${b}`,
    hint: "Multiply the two numbers",
    answer: a * b
  };
}

function makeDivisionQuestion(level) {
  if (level === 0) {
    const b = randInt(2, 10);
    const ans = randInt(1, 10);
    const a = b * ans;
    return {
      text: `${a} ÷ ${b}`,
      hint: "Divide the first number by the second",
      answer: ans
    };
  }

  if (level <= 2) {
    const b = randInt(2, 12);
    const ans = randInt(2, 20);
    const a = b * ans;
    return {
      text: `${a} ÷ ${b}`,
      hint: "Divide the first number by the second",
      answer: ans
    };
  }

  if (level === 3) {
    const b = randInt(3, 15);
    const ans = randInt(4, 25);
    const a = b * ans;
    return {
      text: `${a} ÷ ${b}`,
      hint: "Divide the first number by the second",
      answer: ans
    };
  }

  if (level === 4) {
    const b = pick([4, 5, 8, 10, 20, 25]);
    const ans = round1(Math.random() * 30 + 5);
    const a = round1(b * ans);
    return {
      text: `${fmt(a)} ÷ ${fmt(b)}`,
      hint: "Divide the first number by the second",
      answer: round2(ans)
    };
  }

  const b = pick([3, 4, 5, 6, 8, 10, 12, 15, 20, 25]);
  const ans = round1(Math.random() * 40 + 5);
  const a = round1(b * ans);
  return {
    text: `${fmt(a)} ÷ ${fmt(b)}`,
    hint: "Divide the first number by the second",
    answer: round2(ans)
  };
}

function makePercentageQuestion(level) {
  if (level === 0) {
    const base = pick([20, 40, 50, 80, 100]);
    const pct = pick([10, 20, 25, 50]);
    return {
      text: `${pct}% of ${base}`,
      hint: "Work out the percentage of the number",
      answer: base * pct / 100
    };
  }

  if (level === 1) {
    const base = pick([20, 40, 60, 80, 100, 120]);
    const pct = pick([5, 10, 20, 25, 50]);
    return {
      text: `${pct}% of ${base}`,
      hint: "Work out the percentage of the number",
      answer: base * pct / 100
    };
  }

  if (level === 2) {
    const base = pick([35, 45, 60, 75, 90, 120, 150]);
    const pct = pick([8, 12, 15, 20, 25]);
    return {
      text: `${pct}% of ${base}`,
      hint: "Work out the percentage of the number",
      answer: round2(base * pct / 100)
    };
  }

  if (level === 3) {
    const base = randInt(40, 250);
    const pct = pick([7, 9, 11, 12.5, 15, 17.5, 20]);
    return {
      text: `${pct}% of ${base}`,
      hint: "Work out the percentage of the number",
      answer: round2(base * pct / 100)
    };
  }

  if (level === 4) {
    const base = round1(Math.random() * 250 + 50);
    const pct = pick([6.5, 7.5, 8.5, 11.5, 12.5, 14.5, 17.5, 22.5]);
    return {
      text: `${pct}% of ${fmt(base)}`,
      hint: "Work out the percentage of the number",
      answer: round2(base * pct / 100)
    };
  }

  const base = round1(Math.random() * 400 + 80);
  const pct = round1(Math.random() * 20 + 5);
  return {
    text: `${fmt(pct)}% of ${fmt(base)}`,
    hint: "Work out the percentage of the number",
    answer: round2(base * pct / 100)
  };
}

function generateQuestionByMode(mode) {
  const level = getLevel();

  if (mode === "addition") return makeAdditionQuestion(level);
  if (mode === "subtraction") return makeSubtractionQuestion(level);
  if (mode === "multiplication") return makeMultiplicationQuestion(level);
  if (mode === "division") return makeDivisionQuestion(level);
  if (mode === "percentages") return makePercentageQuestion(level);

  const modes = ["addition", "subtraction", "multiplication", "division", "percentages"];
  return generateQuestionByMode(pick(modes));
}

function nextQuestion() {
  currentQuestion = generateQuestionByMode(getMode());
  document.getElementById("question").innerText = currentQuestion.text;
  document.getElementById("hint").innerText = currentQuestion.hint;
  document.getElementById("answer").value = "";
  document.getElementById("feedback").innerHTML = "";
  document.getElementById("answer").focus();
}

function updateStats() {
  document.getElementById("time").innerText = timeLeft;
  document.getElementById("score").innerText = score;
  document.getElementById("attempts").innerText = attempts;
  const acc = attempts === 0 ? 0 : Math.round((correctCount / attempts) * 100);
  document.getElementById("accuracy").innerText = `${acc}%`;
}

function updateHistory() {
  const historyDiv = document.getElementById("history");
  if (historyItems.length === 0) {
    historyDiv.innerHTML = "No attempts yet.";
    return;
  }

  historyDiv.innerHTML = historyItems.slice(-8).reverse().map(item => `
    <div class="history-item">
      <div class="history-q">${item.q}</div>
      <div class="history-a">Your answer: ${item.user} | Correct: ${item.correct} | <span class="${item.ok ? 'correct' : 'wrong'}">${item.ok ? 'Correct' : 'Wrong'}</span></div>
    </div>
  `).join("");
}

function startRound() {
  clearInterval(timer);
  timeLeft = Number(document.getElementById("roundLength").value);
  score = 0;
  attempts = 0;
  correctCount = 0;
  active = true;
  updateStats();
  nextQuestion();

  timer = setInterval(() => {
    timeLeft--;
    updateStats();

    if (timeLeft <= 0) {
      clearInterval(timer);
      active = false;
      document.getElementById("question").innerText = `Time up. Final score: ${score}`;
      document.getElementById("hint").innerText = "Press Start Round to go again.";
      document.getElementById("feedback").innerHTML = "";
    }
  }, 1000);
}

function resetRound() {
  clearInterval(timer);
  timeLeft = 0;
  score = 0;
  attempts = 0;
  correctCount = 0;
  active = false;
  currentQuestion = null;
  document.getElementById("question").innerText = "Press Start Round";
  document.getElementById("hint").innerText = "Answer as a plain number. For percentages, enter just the number, for example 12.5";
  document.getElementById("feedback").innerHTML = "";
  document.getElementById("answer").value = "";
  updateStats();
}

function submitAnswer() {
  if (!active || !currentQuestion) return;

  const raw = document.getElementById("answer").value.trim();
  if (raw === "") return;

  const user = Number(raw);
  if (Number.isNaN(user)) return;

  attempts++;
  const correct = currentQuestion.answer;
  const ok = Math.abs(user - correct) <= tolerance(correct);

  if (ok) {
    score++;
    correctCount++;
    document.getElementById("feedback").innerHTML = `<span class="correct">Correct</span>`;
  } else {
    document.getElementById("feedback").innerHTML = `<span class="wrong">Correct answer: ${fmt(correct)}</span>`;
  }

  historyItems.push({
    q: currentQuestion.text,
    user: raw,
    correct: fmt(correct),
    ok
  });

  updateStats();
  updateHistory();
  nextQuestion();
}

function skipQuestion() {
  if (!active || !currentQuestion) return;

  historyItems.push({
    q: currentQuestion.text,
    user: "Skipped",
    correct: fmt(currentQuestion.answer),
    ok: false
  });

  document.getElementById("feedback").innerHTML = `<span class="wrong">Skipped. Correct answer: ${fmt(currentQuestion.answer)}</span>`;
  updateHistory();
  nextQuestion();
}

document.getElementById("answer").addEventListener("keydown", function(event) {
  if (event.key === "Enter") {
    submitAnswer();
  }
});

updateStats();
</script>
</body>
</html>
